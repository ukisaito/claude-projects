  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif; }
    #map { height: 100vh; width: 100%; }

    #panel {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(8px);
      padding: 16px 20px;
      border-radius: 14px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.10);
      z-index: 1000;
      min-width: 240px;
      border: 1px solid rgba(0,0,0,0.06);
    }
    #panel-title {
      font-size: 13px;
      font-weight: 700;
      color: #111;
      letter-spacing: 0.02em;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #panel-title span.dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #3B82F6;
    }
    #status-text {
      font-size: 11px;
      color: #888;
      margin-bottom: 8px;
      letter-spacing: 0.01em;
    }
    #progress-bar-outer {
      width: 100%;
      height: 3px;
      background: #f0f0f0;
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    #progress-bar-inner {
      height: 100%;
      background: #3B82F6;
      border-radius: 99px;
      width: 0%;
      transition: width 0.3s ease;
    }
    #count-badges {
      display: flex;
      gap: 6px;
    }
    .badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 99px;
      letter-spacing: 0.01em;
    }
    .badge-ok  { background: #EFF6FF; color: #2563EB; }
    .badge-fail{ background: #FEF2F2; color: #DC2626; }

    /* Leaflet UI をフラットに */
    .leaflet-control-zoom a {
      border-radius: 8px !important;
      border: none !important;
      box-shadow: 0 1px 6px rgba(0,0,0,0.12) !important;
      color: #333 !important;
    }
    .leaflet-popup-content-wrapper {
      border-radius: 10px !important;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12) !important;
      border: 1px solid rgba(0,0,0,0.06) !important;
    }
    .leaflet-popup-tip { display: none; }
    .leaflet-popup-content { margin: 10px 14px !important; }
  </style>
</head>

    const CACHE_KEY = 'broker_map_geocache_v1';
    let cache = {};
    try { cache = JSON.parse(localStorage.getItem(CACHE_KEY) || '{}'); } catch(e) {}

    const allMarkers = [];
    let okCount = 0;
    let failCount = 0;
    const total = addresses.length;

    function updateUI(completed) {
      const pct = (completed / total * 100).toFixed(0);
      document.getElementById('progress-bar-inner').style.width = pct + '%';
      document.getElementById('status-text').textContent =
        completed < total
          ? `ジオコーディング中... ${completed} / ${total} 件`
          : `完了 — ${total} 件処理済み`;
      document.getElementById('badge-ok').textContent = `表示: ${okCount}`;
      document.getElementById('badge-fail').textContent = `未取得: ${failCount}`;
    }

    async function geocode(addr) {
      if (cache[addr]) return cache[addr];
      // 国土地理院 住所検索API（日本語住所に特化、無料・APIキー不要）
      const url = `https://msearch.gsi.go.jp/address-search/AddressSearch?q=${encodeURIComponent(addr)}`;
      try {
        const res = await fetch(url);
        const data = await res.json();
        if (data && data.length > 0) {
          const coords = data[0].geometry.coordinates; // [lng, lat]
          const r = { lat: parseFloat(coords[1]), lng: parseFloat(coords[0]) };
          cache[addr] = r;
          try { localStorage.setItem(CACHE_KEY, JSON.stringify(cache)); } catch(e) {}
          return r;
        }
      } catch(e) { console.warn('Geocode error:', addr, e); }
      return null;
    }

    async function main() {
      const bounds = [];
      for (let i = 0; i < addresses.length; i++) {
        const addr = addresses[i];
        const isCached = !!cache[addr];

        const result = await geocode(addr);

        if (result) {
          okCount++;
          bounds.push([result.lat, result.lng]);
          const marker = L.marker([result.lat, result.lng], { icon: blueIcon })
            .addTo(map)
            .bindPopup(`<b style="font-size:13px">${originalAddresses[i]}</b>`);
          allMarkers.push(marker);
        } else {
          failCount++;
          console.warn('取得失敗:', addr);
        }

        updateUI(i + 1);

        // GSI APIは200ms間隔で安定動作（キャッシュ済みはスキップ）
        if (!isCached && i < addresses.length - 1) {
          await new Promise(r => setTimeout(r, 200));
        }
      }

      // Fit map to all markers
      if (bounds.length > 0) {
        map.fitBounds(bounds, { padding: [40, 40] });
      }
    }

    main();
